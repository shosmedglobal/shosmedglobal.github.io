<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CF5B2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A84823;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef0e8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Decorative circle ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#CF5B2E" stroke-width="0.5" opacity="0.25"/>

  <!-- Globe/Circle Mark -->
  <circle cx="50" cy="50" r="38" fill="url(#globeGrad)" />

  <!-- Globe latitude lines -->
  <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <ellipse cx="50" cy="50" rx="38" ry="28" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

  <!-- Globe longitude lines -->
  <ellipse cx="50" cy="50" rx="14" ry="38" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.2"/>
  <ellipse cx="50" cy="50" rx="28" ry="38" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

  <!-- Medical cross -->
  <rect x="42" y="32" width="16" height="36" rx="2.5" fill="url(#crossGrad)" opacity="0.95"/>
  <rect x="32" y="42" width="36" height="16" rx="2.5" fill="url(#crossGrad)" opacity="0.95"/>

  <!-- Text: SHOS -->
  <text x="105" y="45" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="36" fill="#1B2137" letter-spacing="1">SHOS</text>

  <!-- Text: Med -->
  <text x="228" y="45" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="36" fill="#CF5B2E" letter-spacing="0.5">Med</text>

  <!-- Text: Global -->
  <text x="105" y="75" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="22" fill="#6E6B66" letter-spacing="4">GLOBAL</text>

  <!-- Decorative dot -->
  <circle cx="300" cy="70" r="3" fill="#CF5B2E" opacity="0.4"/>
</svg>