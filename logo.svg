<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6E1B28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5e8ea;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Globe/Circle Mark -->
  <circle cx="50" cy="50" r="38" fill="url(#globeGrad)" />

  <!-- Globe latitude lines -->
  <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  <ellipse cx="50" cy="50" rx="38" ry="28" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

  <!-- Globe longitude lines -->
  <ellipse cx="50" cy="50" rx="14" ry="38" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>
  <ellipse cx="50" cy="50" rx="28" ry="38" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>

  <!-- Medical cross -->
  <rect x="42" y="32" width="16" height="36" rx="2.5" fill="url(#crossGrad)" opacity="0.95"/>
  <rect x="32" y="42" width="36" height="16" rx="2.5" fill="url(#crossGrad)" opacity="0.95"/>

  <!-- Text: SHOS -->
  <text x="105" y="45" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="36" fill="#1A1A2E" letter-spacing="1">SHOS</text>

  <!-- Text: Med -->
  <text x="228" y="45" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="36" fill="#8B2332" letter-spacing="0.5">Med</text>

  <!-- Text: Global -->
  <text x="105" y="75" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="22" fill="#737373" letter-spacing="4">GLOBAL</text>

  <!-- Subtle dot separator -->
  <circle cx="300" cy="70" r="3" fill="#8B2332" opacity="0.5"/>
</svg>