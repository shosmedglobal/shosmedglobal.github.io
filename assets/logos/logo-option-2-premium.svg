<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="p2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2137"/>
      <stop offset="100%" style="stop-color:#2D3555"/>
    </linearGradient>
    <linearGradient id="p2Cross" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CF5B2E"/>
      <stop offset="100%" style="stop-color:#E8784A"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M50 8 L86 22 L86 52 C86 70 70 85 50 92 C30 85 14 70 14 52 L14 22 Z" fill="url(#p2Grad)"/>
  <!-- Shield inner border -->
  <path d="M50 12 L82 24.5 L82 52 C82 67.5 67.5 81 50 87.5 C32.5 81 18 67.5 18 52 L18 24.5 Z" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>

  <!-- Medical cross in shield -->
  <rect x="43" y="30" width="14" height="34" rx="2" fill="url(#p2Cross)"/>
  <rect x="33" y="40" width="34" height="14" rx="2" fill="url(#p2Cross)"/>

  <!-- Decorative laurel-like arcs -->
  <path d="M10 50 Q10 20, 30 10" fill="none" stroke="#CF5B2E" stroke-width="0.6" opacity="0.3"/>
  <path d="M90 50 Q90 20, 70 10" fill="none" stroke="#CF5B2E" stroke-width="0.6" opacity="0.3"/>
  <path d="M10 50 Q10 80, 30 90" fill="none" stroke="#CF5B2E" stroke-width="0.6" opacity="0.3"/>
  <path d="M90 50 Q90 80, 70 90" fill="none" stroke="#CF5B2E" stroke-width="0.6" opacity="0.3"/>

  <!-- SHOS — navy, bold serif-like -->
  <text x="110" y="43" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="36" fill="#1B2137" letter-spacing="2">SHOS</text>
  <!-- Med — burnt orange -->
  <text x="250" y="43" font-family="'Playfair Display', Georgia, serif" font-weight="600" font-size="36" fill="#CF5B2E" letter-spacing="1">Med</text>
  <!-- GLOBAL — refined, spaced -->
  <text x="110" y="72" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="15" fill="#8B8986" letter-spacing="8">GLOBAL</text>

  <!-- Thin divider line -->
  <line x1="110" y1="52" x2="220" y2="52" stroke="#CF5B2E" stroke-width="0.6" opacity="0.35"/>
</svg>