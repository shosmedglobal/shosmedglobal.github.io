<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="'Segoe UI', Arial, sans-serif" font-size="11">
  <title>Optics — Convex vs Concave Lens</title>

  <defs>
    <!-- Lens gradients -->
    <linearGradient id="convexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90caf9" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#e3f2fd" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="concaveGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef9a9a" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#ffebee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e57373" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Ray gradient -->
    <linearGradient id="rayGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#ffc107"/>
    </linearGradient>
    <linearGradient id="rayGradFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#ff9800"/>
    </linearGradient>
    <linearGradient id="virtualRayGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcc80" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffe0b2" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Focal point glow -->
    <radialGradient id="focalGlow">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffb74d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffe0b2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="focalGlowRed">
      <stop offset="0%" stop-color="#e57373" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ef9a9a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffcdd2" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="110%" height="115%">
      <feDropShadow dx="1.5" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.13"/>
    </filter>
    <filter id="shadowSm" x="-3%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="1" dy="1.2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.10"/>
    </filter>

    <!-- Arrowhead markers -->
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f57c00"/>
    </marker>
    <marker id="arrowOrangeFade" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ffb74d" opacity="0.6"/>
    </marker>

    <!-- Lens edge stroke gradients -->
    <linearGradient id="convexStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#64b5f6"/>
    </linearGradient>
    <linearGradient id="concaveStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#ef9a9a"/>
    </linearGradient>

    <!-- Section background gradient -->
    <linearGradient id="sectionBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="formulaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#fff3e0"/>
    </linearGradient>
  </defs>

  <!-- Overall background -->
  <rect width="720" height="520" rx="8" fill="#ffffff"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="17" fill="#1a237e" font-weight="700" letter-spacing="0.5">Converging vs Diverging Lenses</text>
  <line x1="180" y1="34" x2="540" y2="34" stroke="#1a237e" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- ===== CONVEX (CONVERGING) LENS SECTION ===== -->
  <rect x="10" y="44" width="345" height="210" rx="7" fill="url(#sectionBg)" stroke="#bbdefb" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="182" y="62" text-anchor="middle" font-size="12.5" fill="#1565c0" font-weight="700">Convex (Converging) Lens</text>

  <!-- Principal axis -->
  <line x1="30" y1="148" x2="340" y2="148" stroke="#90a4ae" stroke-width="0.8" stroke-dasharray="6,3"/>

  <!-- Object arrow (left side) -->
  <line x1="70" y1="148" x2="70" y2="108" stroke="#4527a0" stroke-width="1.8"/>
  <polygon points="70,105 66,113 74,113" fill="#4527a0"/>
  <text x="70" y="102" text-anchor="middle" font-size="8.5" fill="#4527a0" font-weight="600">Object</text>

  <!-- Convex lens shape (biconvex, glass-like) -->
  <path d="M182,88 Q198,148 182,208 Q166,148 182,88 Z" fill="url(#convexGrad)" stroke="url(#convexStroke)" stroke-width="1.6"/>
  <!-- Lens highlight streak -->
  <path d="M178,100 Q186,148 178,196" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Focal point F (right) with glow -->
  <circle cx="242" cy="148" r="10" fill="url(#focalGlow)"/>
  <circle cx="242" cy="148" r="2.8" fill="#f57c00"/>
  <text x="242" y="168" text-anchor="middle" font-size="9.5" fill="#e65100" font-weight="700">F</text>

  <!-- Focal point F (left) with glow -->
  <circle cx="122" cy="148" r="10" fill="url(#focalGlow)"/>
  <circle cx="122" cy="148" r="2.8" fill="#f57c00"/>
  <text x="122" y="168" text-anchor="middle" font-size="9.5" fill="#e65100" font-weight="700">F'</text>

  <!-- Parallel rays converging to focal point -->
  <!-- Ray 1: top parallel, then converges -->
  <line x1="30" y1="113" x2="182" y2="113" stroke="url(#rayGrad)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="182" y1="113" x2="310" y2="178" stroke="url(#rayGradFade)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Ray 2: center parallel, through center -->
  <line x1="30" y1="148" x2="182" y2="148" stroke="url(#rayGrad)" stroke-width="1.3"/>
  <line x1="182" y1="148" x2="310" y2="148" stroke="url(#rayGradFade)" stroke-width="1.3" marker-end="url(#arrowOrange)"/>

  <!-- Ray 3: bottom parallel, then converges -->
  <line x1="30" y1="183" x2="182" y2="183" stroke="url(#rayGrad)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="182" y1="183" x2="310" y2="118" stroke="url(#rayGradFade)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Convergence marker -->
  <circle cx="310" cy="148" r="1.5" fill="#f57c00" opacity="0.5"/>

  <!-- Labels for convex -->
  <text x="182" y="224" text-anchor="middle" font-size="9" fill="#37474f" font-style="italic">f &gt; 0 (positive focal length)</text>

  <!-- Key facts (convex) -->
  <text x="25" y="242" font-size="8.5" fill="#1565c0" font-weight="600">Key facts:</text>
  <text x="25" y="253" font-size="8" fill="#455a64">- Thicker in center, thinner at edges</text>
  <text x="25" y="263" font-size="8" fill="#455a64">- Real, inverted image (if d&#x2080; &gt; f)</text>
  <text x="25" y="273" font-size="8" fill="#455a64">- Uses: magnifying glass, camera, eye</text>

  <!-- Image arrow (right side, inverted) -->
  <line x1="300" y1="148" x2="300" y2="176" stroke="#00695c" stroke-width="1.8"/>
  <polygon points="300,179 296,171 304,171" fill="#00695c"/>
  <text x="300" y="190" text-anchor="middle" font-size="8" fill="#00695c" font-weight="600">Image</text>

  <!-- ===== CONCAVE (DIVERGING) LENS SECTION ===== -->
  <rect x="365" y="44" width="345" height="210" rx="7" fill="url(#sectionBg)" stroke="#ffcdd2" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="537" y="62" text-anchor="middle" font-size="12.5" fill="#c62828" font-weight="700">Concave (Diverging) Lens</text>

  <!-- Principal axis -->
  <line x1="385" y1="148" x2="695" y2="148" stroke="#90a4ae" stroke-width="0.8" stroke-dasharray="6,3"/>

  <!-- Object arrow (left side) -->
  <line x1="420" y1="148" x2="420" y2="108" stroke="#4527a0" stroke-width="1.8"/>
  <polygon points="420,105 416,113 424,113" fill="#4527a0"/>
  <text x="420" y="102" text-anchor="middle" font-size="8.5" fill="#4527a0" font-weight="600">Object</text>

  <!-- Concave lens shape (biconcave, glass-like) -->
  <path d="M537,88 Q521,148 537,208 Q553,148 537,88 Z" fill="url(#concaveGrad)" stroke="url(#concaveStroke)" stroke-width="1.6"/>
  <!-- Concave top/bottom caps -->
  <line x1="530" y1="88" x2="544" y2="88" stroke="url(#concaveStroke)" stroke-width="1.4"/>
  <line x1="530" y1="208" x2="544" y2="208" stroke="url(#concaveStroke)" stroke-width="1.4"/>
  <!-- Lens highlight -->
  <path d="M541,100 Q533,148 541,196" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.45"/>

  <!-- Virtual focal point F (left) with glow -->
  <circle cx="477" cy="148" r="10" fill="url(#focalGlowRed)"/>
  <circle cx="477" cy="148" r="2.8" fill="#c62828"/>
  <text x="477" y="168" text-anchor="middle" font-size="9.5" fill="#b71c1c" font-weight="700">F</text>

  <!-- Focal point F (right) -->
  <circle cx="597" cy="148" r="10" fill="url(#focalGlowRed)"/>
  <circle cx="597" cy="148" r="2.8" fill="#c62828"/>
  <text x="597" y="168" text-anchor="middle" font-size="9.5" fill="#b71c1c" font-weight="700">F'</text>

  <!-- Parallel rays diverging -->
  <!-- Ray 1: top parallel, then diverges outward -->
  <line x1="385" y1="113" x2="537" y2="113" stroke="url(#rayGrad)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="537" y1="113" x2="680" y2="88" stroke="url(#rayGradFade)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Virtual extension of ray 1 back to F -->
  <line x1="537" y1="113" x2="477" y2="148" stroke="url(#virtualRayGrad)" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowOrangeFade)"/>

  <!-- Ray 2: center -->
  <line x1="385" y1="148" x2="537" y2="148" stroke="url(#rayGrad)" stroke-width="1.3"/>
  <line x1="537" y1="148" x2="680" y2="148" stroke="url(#rayGradFade)" stroke-width="1.3" marker-end="url(#arrowOrange)"/>

  <!-- Ray 3: bottom parallel, then diverges outward -->
  <line x1="385" y1="183" x2="537" y2="183" stroke="url(#rayGrad)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="537" y1="183" x2="680" y2="208" stroke="url(#rayGradFade)" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Virtual extension of ray 3 back to F -->
  <line x1="537" y1="183" x2="477" y2="148" stroke="url(#virtualRayGrad)" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrowOrangeFade)"/>

  <!-- Virtual image arrow (left side of lens, upright, smaller) -->
  <line x1="495" y1="148" x2="495" y2="127" stroke="#00695c" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="495,124 492,130 498,130" fill="#00695c" opacity="0.65"/>
  <text x="495" y="120" text-anchor="middle" font-size="7.5" fill="#00695c" font-weight="600" opacity="0.8">Virtual Image</text>

  <!-- Labels for concave -->
  <text x="537" y="224" text-anchor="middle" font-size="9" fill="#37474f" font-style="italic">f &lt; 0 (negative focal length)</text>

  <!-- Key facts (concave) -->
  <text x="380" y="242" font-size="8.5" fill="#c62828" font-weight="600">Key facts:</text>
  <text x="380" y="253" font-size="8" fill="#455a64">- Thinner in center, thicker at edges</text>
  <text x="380" y="263" font-size="8" fill="#455a64">- Virtual, upright, reduced image (always)</text>
  <text x="380" y="273" font-size="8" fill="#455a64">- Uses: eyeglasses (myopia), peepholes</text>

  <!-- ===== FORMULAS BOX ===== -->
  <rect x="10" y="290" width="700" height="100" rx="7" fill="url(#formulaBg)" stroke="#ffe0b2" stroke-width="0.8" filter="url(#shadow)"/>

  <!-- Section title -->
  <text x="360" y="310" text-anchor="middle" font-size="12.5" fill="#e65100" font-weight="700">Key Formulas &amp; Sign Conventions</text>
  <line x1="200" y1="316" x2="520" y2="316" stroke="#ffcc80" stroke-width="0.8"/>

  <!-- Thin lens equation -->
  <text x="60" y="340" font-size="10.5" fill="#37474f" font-weight="600">Thin Lens Equation:</text>
  <text x="60" y="356" font-size="12" fill="#1a237e" font-weight="700" font-style="italic">1/f = 1/d&#x2080; + 1/d&#x1D62;</text>

  <!-- Divider -->
  <line x1="235" y1="328" x2="235" y2="380" stroke="#ffcc80" stroke-width="0.6"/>

  <!-- Magnification -->
  <text x="265" y="340" font-size="10.5" fill="#37474f" font-weight="600">Magnification:</text>
  <text x="265" y="356" font-size="12" fill="#1a237e" font-weight="700" font-style="italic">m = &#x2212;d&#x1D62; / d&#x2080; = h&#x1D62; / h&#x2080;</text>

  <!-- Divider -->
  <line x1="445" y1="328" x2="445" y2="380" stroke="#ffcc80" stroke-width="0.6"/>

  <!-- Refractive power -->
  <text x="475" y="340" font-size="10.5" fill="#37474f" font-weight="600">Refractive Power:</text>
  <text x="475" y="356" font-size="12" fill="#1a237e" font-weight="700" font-style="italic">P = 1/f</text>
  <text x="475" y="371" font-size="9" fill="#546e7f">(in diopters, when f in meters)</text>

  <!-- Sign convention note -->
  <text x="60" y="380" font-size="8.5" fill="#795548" font-style="italic">d&#x2080; &gt; 0 (object same side as light) | d&#x1D62; &gt; 0 (real image, opposite side) | d&#x1D62; &lt; 0 (virtual image, same side as object)</text>

  <!-- ===== SIGN CONVENTIONS / SUMMARY BOX ===== -->
  <rect x="10" y="400" width="700" height="110" rx="7" fill="url(#sectionBg)" stroke="#cfd8dc" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="360" y="420" text-anchor="middle" font-size="12" fill="#37474f" font-weight="700">Sign Convention Summary</text>
  <line x1="230" y1="425" x2="490" y2="425" stroke="#b0bec5" stroke-width="0.6"/>

  <!-- Convex column -->
  <rect x="30" y="434" width="310" height="62" rx="5" fill="#e3f2fd" fill-opacity="0.5" stroke="#90caf9" stroke-width="0.5"/>
  <text x="185" y="449" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="700">Convex (Converging)</text>
  <text x="45" y="464" font-size="8.5" fill="#37474f">f &gt; 0 | P &gt; 0</text>
  <text x="45" y="476" font-size="8.5" fill="#37474f">Real image: d&#x1D62; &gt; 0, m &lt; 0 (inverted)</text>
  <text x="45" y="488" font-size="8.5" fill="#37474f">Virtual image (d&#x2080; &lt; f): d&#x1D62; &lt; 0, m &gt; 0 (upright)</text>

  <!-- Concave column -->
  <rect x="380" y="434" width="310" height="62" rx="5" fill="#ffebee" fill-opacity="0.5" stroke="#ef9a9a" stroke-width="0.5"/>
  <text x="535" y="449" text-anchor="middle" font-size="10" fill="#c62828" font-weight="700">Concave (Diverging)</text>
  <text x="395" y="464" font-size="8.5" fill="#37474f">f &lt; 0 | P &lt; 0</text>
  <text x="395" y="476" font-size="8.5" fill="#37474f">Always virtual image: d&#x1D62; &lt; 0</text>
  <text x="395" y="488" font-size="8.5" fill="#37474f">Always upright and reduced: 0 &lt; m &lt; 1</text>
</svg>
