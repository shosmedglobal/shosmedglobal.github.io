<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="'Segoe UI', Arial, sans-serif" font-size="11">
  <title>Electromagnetic Spectrum</title>

  <defs>
    <!-- Main spectrum gradient -->
    <linearGradient id="spectrumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a0080"/>
      <stop offset="8%" stop-color="#6a00b0"/>
      <stop offset="15%" stop-color="#3b0097"/>
      <stop offset="22%" stop-color="#1a0fa0"/>
      <stop offset="30%" stop-color="#0044cc"/>
      <stop offset="38%" stop-color="#0066ff"/>
      <stop offset="42%" stop-color="#00aaff"/>
      <stop offset="46%" stop-color="#00cc44"/>
      <stop offset="50%" stop-color="#aaff00"/>
      <stop offset="54%" stop-color="#ffee00"/>
      <stop offset="58%" stop-color="#ff8800"/>
      <stop offset="62%" stop-color="#ff2200"/>
      <stop offset="70%" stop-color="#aa0000"/>
      <stop offset="80%" stop-color="#660000"/>
      <stop offset="88%" stop-color="#6b3a1f"/>
      <stop offset="100%" stop-color="#c8a96e"/>
    </linearGradient>

    <!-- Visible spectrum detailed gradient -->
    <linearGradient id="visibleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b00ff"/>
      <stop offset="12%" stop-color="#4400ff"/>
      <stop offset="25%" stop-color="#0044ff"/>
      <stop offset="38%" stop-color="#00ccff"/>
      <stop offset="50%" stop-color="#00ff44"/>
      <stop offset="63%" stop-color="#ccff00"/>
      <stop offset="75%" stop-color="#ffcc00"/>
      <stop offset="87%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>

    <!-- Frequency arrow gradient (red) -->
    <linearGradient id="freqArrowGrad" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#e53e3e"/>
      <stop offset="100%" stop-color="#feb2b2"/>
    </linearGradient>

    <!-- Wavelength arrow gradient (blue) -->
    <linearGradient id="waveArrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3182ce"/>
      <stop offset="100%" stop-color="#bee3f8"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.22"/>
    </filter>

    <!-- Lighter shadow for badges -->
    <filter id="shadowLight" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.15"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#e53e3e"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3182ce"/>
    </marker>

    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" rx="10" fill="url(#bgGrad)"/>

  <!-- Title with decorative underline -->
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#1a202c" letter-spacing="0.5">The Electromagnetic Spectrum</text>
  <line x1="230" y1="34" x2="490" y2="34" stroke="#3182ce" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="270" y1="38" x2="450" y2="38" stroke="#63b3ed" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Trend arrows -->
  <!-- Frequency arrow (left, high) -->
  <line x1="645" y1="52" x2="75" y2="52" stroke="url(#freqArrowGrad)" stroke-width="3" marker-end="url(#arrowRed)" stroke-linecap="round"/>
  <text x="55" y="56" font-size="9.5" fill="#e53e3e" font-weight="600" text-anchor="end">High f</text>
  <text x="660" y="56" font-size="9.5" fill="#feb2b2" font-weight="600">Low f</text>

  <!-- Wavelength arrow (right, long) -->
  <line x1="75" y1="62" x2="645" y2="62" stroke="url(#waveArrowGrad)" stroke-width="3" marker-end="url(#arrowBlue)" stroke-linecap="round"/>
  <text x="55" y="66" font-size="9.5" fill="#bee3f8" font-weight="600" text-anchor="end">Short &#955;</text>
  <text x="660" y="66" font-size="9.5" fill="#3182ce" font-weight="600">Long &#955;</text>

  <!-- Region badges / pills above the bar -->
  <!-- Gamma -->
  <rect x="42" y="72" width="62" height="19" rx="9.5" fill="#5b21b6" filter="url(#shadowLight)"/>
  <text x="73" y="85" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">Gamma (&#947;)</text>

  <!-- X-ray -->
  <rect x="112" y="72" width="58" height="19" rx="9.5" fill="#4338ca" filter="url(#shadowLight)"/>
  <text x="141" y="85" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">X-ray</text>

  <!-- UV -->
  <rect x="178" y="72" width="62" height="19" rx="9.5" fill="#2563eb" filter="url(#shadowLight)"/>
  <text x="209" y="85" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">UV</text>

  <!-- Visible -->
  <rect x="248" y="72" width="62" height="19" rx="9.5" fill="#059669" filter="url(#shadowLight)"/>
  <text x="279" y="85" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">Visible</text>

  <!-- IR -->
  <rect x="318" y="72" width="62" height="19" rx="9.5" fill="#b91c1c" filter="url(#shadowLight)"/>
  <text x="349" y="85" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">Infrared</text>

  <!-- Microwave -->
  <rect x="408" y="72" width="72" height="19" rx="9.5" fill="#92400e" filter="url(#shadowLight)"/>
  <text x="444" y="85" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">Microwave</text>

  <!-- Radio -->
  <rect x="530" y="72" width="62" height="19" rx="9.5" fill="#a16207" filter="url(#shadowLight)"/>
  <text x="561" y="85" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">Radio</text>

  <!-- Main spectrum bar with rounded ends and shadow -->
  <rect x="50" y="96" width="620" height="28" rx="14" fill="url(#spectrumGrad)" filter="url(#shadow)"/>

  <!-- Wave symbols along the bar (getting larger left to right) -->
  <text x="73" y="114" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.7)">&#8767;</text>
  <text x="141" y="114" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">&#8767;</text>
  <text x="209" y="114" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">&#8767;</text>
  <text x="279" y="114" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.8)">&#8767;</text>
  <text x="349" y="114" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.7)">&#8767;</text>
  <text x="444" y="115" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.6)">&#8767;</text>
  <text x="561" y="115" text-anchor="middle" font-size="19" fill="rgba(255,255,255,0.5)">&#8767;</text>

  <!-- Wavelength labels below bar -->
  <text x="73" y="139" text-anchor="middle" font-size="8" fill="#5b21b6">&lt;0.01 nm</text>
  <text x="141" y="139" text-anchor="middle" font-size="8" fill="#4338ca">0.01-10 nm</text>
  <text x="209" y="139" text-anchor="middle" font-size="8" fill="#2563eb">10-400 nm</text>
  <text x="279" y="139" text-anchor="middle" font-size="8" fill="#059669">400-700 nm</text>
  <text x="349" y="139" text-anchor="middle" font-size="8" fill="#b91c1c">700 nm-1 mm</text>
  <text x="444" y="139" text-anchor="middle" font-size="8" fill="#92400e">1 mm-1 m</text>
  <text x="561" y="139" text-anchor="middle" font-size="8" fill="#a16207">&gt;1 m</text>

  <!-- Energy label -->
  <text x="73" y="149" text-anchor="middle" font-size="7" fill="#6b7280">High energy</text>
  <text x="561" y="149" text-anchor="middle" font-size="7" fill="#6b7280">Low energy</text>

  <!-- Expanded visible light strip -->
  <text x="360" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#1a202c">Visible Light (400 - 700 nm)</text>

  <!-- Visible strip background with shadow -->
  <rect x="120" y="170" width="480" height="22" rx="11" fill="#e2e8f0" filter="url(#shadow)"/>

  <!-- Individual color bands inside the strip -->
  <rect x="122" y="171" width="66" height="20" rx="10" ry="0" fill="#8b00ff"/><!-- violet -->
  <rect x="188" y="171" width="56" height="20" fill="#4400ff"/><!-- indigo -->
  <rect x="244" y="171" width="56" height="20" fill="#0066ff"/><!-- blue -->
  <rect x="300" y="171" width="66" height="20" fill="#00cc44"/><!-- green -->
  <rect x="366" y="171" width="66" height="20" fill="#ccdd00"/><!-- yellow -->
  <rect x="432" y="171" width="66" height="20" fill="#ff8800"/><!-- orange -->
  <rect x="498" y="171" width="100" height="20" rx="10" ry="0" fill="#ff0000"/><!-- red -->

  <!-- Rounded left cap -->
  <rect x="120" y="170" width="22" height="22" rx="11" fill="#8b00ff"/>

  <!-- Rounded right cap -->
  <rect x="578" y="170" width="22" height="22" rx="11" fill="#ff0000"/>

  <!-- Color labels -->
  <text x="155" y="207" text-anchor="middle" font-size="7.5" fill="#5b21b6" font-weight="600">Violet</text>
  <text x="155" y="215" text-anchor="middle" font-size="6.5" fill="#718096">~400 nm</text>

  <text x="216" y="207" text-anchor="middle" font-size="7.5" fill="#4338ca" font-weight="600">Indigo</text>
  <text x="216" y="215" text-anchor="middle" font-size="6.5" fill="#718096">~445 nm</text>

  <text x="272" y="207" text-anchor="middle" font-size="7.5" fill="#2563eb" font-weight="600">Blue</text>
  <text x="272" y="215" text-anchor="middle" font-size="6.5" fill="#718096">~475 nm</text>

  <text x="333" y="207" text-anchor="middle" font-size="7.5" fill="#059669" font-weight="600">Green</text>
  <text x="333" y="215" text-anchor="middle" font-size="6.5" fill="#718096">~510 nm</text>

  <text x="399" y="207" text-anchor="middle" font-size="7.5" fill="#b08c00" font-weight="600">Yellow</text>
  <text x="399" y="215" text-anchor="middle" font-size="6.5" fill="#718096">~570 nm</text>

  <text x="465" y="207" text-anchor="middle" font-size="7.5" fill="#c05621" font-weight="600">Orange</text>
  <text x="465" y="215" text-anchor="middle" font-size="6.5" fill="#718096">~590 nm</text>

  <text x="548" y="207" text-anchor="middle" font-size="7.5" fill="#c53030" font-weight="600">Red</text>
  <text x="548" y="215" text-anchor="middle" font-size="6.5" fill="#718096">~700 nm</text>

  <!-- ROY G. BIV mnemonic -->
  <rect x="248" y="222" width="224" height="18" rx="9" fill="#fff" stroke="#cbd5e0" stroke-width="0.8" filter="url(#shadowLight)"/>
  <text x="360" y="234" text-anchor="middle" font-size="9" fill="#2d3748" font-weight="600">
    <tspan fill="#ff0000">R</tspan><tspan fill="#ff6600">O</tspan><tspan fill="#ccbb00">Y</tspan>
    <tspan fill="#718096"> G. </tspan>
    <tspan fill="#2563eb">B</tspan><tspan fill="#4338ca">I</tspan><tspan fill="#7c3aed">V</tspan>
    <tspan fill="#718096" font-weight="400"> = Red Orange Yellow Green Blue Indigo Violet</tspan>
  </text>

  <!-- Formulas box -->
  <rect x="20" y="250" width="325" height="118" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Formulas header -->
  <rect x="20" y="250" width="325" height="22" rx="8" fill="#2d3748"/>
  <rect x="20" y="262" width="325" height="10" fill="#2d3748"/>
  <text x="182" y="265" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">Key Formulas &amp; Constants</text>

  <!-- Divider under header already handled by bg -->

  <!-- Formulas content -->
  <text x="35" y="288" font-size="10" fill="#2d3748" font-weight="600">Wave Equation:</text>
  <text x="35" y="301" font-size="11" fill="#4a5568" font-style="italic">c = &#955;f</text>
  <text x="105" y="301" font-size="8.5" fill="#718096">(speed = wavelength x frequency)</text>

  <!-- Divider -->
  <line x1="35" y1="308" x2="330" y2="308" stroke="#e2e8f0" stroke-width="0.8"/>

  <text x="35" y="322" font-size="10" fill="#2d3748" font-weight="600">Photon Energy:</text>
  <text x="35" y="335" font-size="11" fill="#4a5568" font-style="italic">E = hf = hc / &#955;</text>
  <text x="150" y="335" font-size="8.5" fill="#718096">(higher f &#8594; higher energy)</text>

  <!-- Divider -->
  <line x1="35" y1="342" x2="330" y2="342" stroke="#e2e8f0" stroke-width="0.8"/>

  <!-- Constants -->
  <text x="35" y="356" font-size="9" fill="#2d3748" font-weight="600">Constants:</text>
  <text x="105" y="356" font-size="9" fill="#4a5568">c = 3.0 x 10&#8312; m/s</text>
  <text x="245" y="356" font-size="9" fill="#4a5568">h = 6.63 x 10&#8315;&#179;&#8308; J&#183;s</text>

  <!-- Exam facts box -->
  <rect x="358" y="250" width="345" height="118" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Exam facts header -->
  <rect x="358" y="250" width="345" height="22" rx="8" fill="#b91c1c"/>
  <rect x="358" y="262" width="345" height="10" fill="#b91c1c"/>
  <text x="530" y="265" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">High-Yield Exam Facts</text>

  <!-- Exam facts content -->
  <circle cx="376" cy="286" r="3" fill="#e53e3e"/>
  <text x="385" y="289" font-size="9" fill="#2d3748"><tspan font-weight="600">UV radiation</tspan> (10-400 nm): causes DNA damage (pyrimidine dimers),</text>
  <text x="385" y="300" font-size="9" fill="#4a5568">sunburn, skin cancer; UVA ages, UVB burns</text>

  <line x1="373" y1="307" x2="690" y2="307" stroke="#e2e8f0" stroke-width="0.8"/>

  <circle cx="376" cy="318" r="3" fill="#e53e3e"/>
  <text x="385" y="321" font-size="9" fill="#2d3748"><tspan font-weight="600">X-rays</tspan> (0.01-10 nm): ionizing radiation; used in imaging;</text>
  <text x="385" y="332" font-size="9" fill="#4a5568">penetrates soft tissue, absorbed by bone (photoelectric effect)</text>

  <line x1="373" y1="339" x2="690" y2="339" stroke="#e2e8f0" stroke-width="0.8"/>

  <circle cx="376" cy="350" r="3" fill="#e53e3e"/>
  <text x="385" y="353" font-size="9" fill="#2d3748"><tspan font-weight="600">Gamma rays</tspan> (&lt;0.01 nm): highest energy; nuclear decay;</text>
  <text x="385" y="364" font-size="9" fill="#4a5568">used in radiation therapy (&#947;-knife) and PET scans</text>
</svg>
