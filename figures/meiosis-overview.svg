<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Segoe UI', Arial, sans-serif" font-size="11">
  <title>Meiosis Overview — Two Divisions</title>

  <defs>
    <!-- Radial gradients for cells -->
    <radialGradient id="parentCellGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </radialGradient>
    <radialGradient id="meiosisICellGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </radialGradient>
    <radialGradient id="meiosisIICellGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </radialGradient>
    <radialGradient id="finalCellGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="70%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#86efac"/>
    </radialGradient>
    <radialGradient id="prophaseGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#fed7d7"/>
    </radialGradient>

    <!-- Chromosome gradients -->
    <linearGradient id="maternalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="paternalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Phase box gradients -->
    <linearGradient id="meiosisIBoxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="meiosisIIBoxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="factsBoxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <!-- Drop shadows -->
    <filter id="ds">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.18"/>
    </filter>
    <filter id="dsSmall">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-opacity="0.12"/>
    </filter>
    <filter id="dsBox">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.14"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="17" fill="#1e293b" font-weight="bold">Meiosis — From Diploid to Haploid</text>
  <line x1="200" y1="30" x2="520" y2="30" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Parent cell (2n=4, two homologous pairs) -->
  <circle cx="80" cy="105" r="46" fill="url(#parentCellGrad)" stroke="#2563eb" stroke-width="2.5" filter="url(#ds)"/>
  <text x="80" y="66" text-anchor="middle" font-size="11.5" fill="#1e40af" font-weight="bold">Parent Cell</text>
  <!-- Pair 1: long chromosomes -->
  <line x1="60" y1="88" x2="60" y2="120" stroke="url(#maternalGrad)" stroke-width="5" stroke-linecap="round"/>
  <line x1="71" y1="88" x2="71" y2="120" stroke="url(#paternalGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Pair 2: short chromosomes -->
  <line x1="89" y1="93" x2="89" y2="115" stroke="url(#maternalGrad)" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="93" x2="100" y2="115" stroke="url(#paternalGrad)" stroke-width="5" stroke-linecap="round"/>
  <text x="80" y="162" text-anchor="middle" font-size="10.5" fill="#1e40af" font-weight="bold">2n = 4</text>
  <text x="80" y="174" text-anchor="middle" font-size="9" fill="#64748b">(diploid)</text>

  <!-- Arrow to Meiosis I -->
  <path d="M130 105 L172 105" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="152" y="95" text-anchor="middle" font-size="8.5" fill="#475569">DNA</text>
  <text x="152" y="84" text-anchor="middle" font-size="8.5" fill="#475569">replicates</text>

  <!-- ===== MEIOSIS I ===== -->
  <rect x="178" y="40" width="225" height="160" rx="12" fill="url(#meiosisIBoxGrad)" stroke="#dc2626" stroke-width="2" filter="url(#dsBox)"/>
  <text x="290" y="58" text-anchor="middle" font-size="13.5" fill="#dc2626" font-weight="bold">MEIOSIS I (Reductional)</text>

  <!-- Prophase I: crossing over -->
  <g transform="translate(215,76)">
    <circle cx="0" cy="30" r="29" fill="url(#prophaseGrad)" stroke="#e11d48" stroke-width="1.5" filter="url(#dsSmall)"/>
    <!-- Homologous pairs crossing -->
    <line x1="-10" y1="15" x2="-10" y2="45" stroke="url(#maternalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-2" y1="15" x2="-2" y2="45" stroke="url(#paternalGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Crossover X -->
    <line x1="-13" y1="28" x2="1" y2="33" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="1" y1="28" x2="-13" y2="33" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
    <text x="14" y="25" font-size="7.5" fill="#7c3aed" font-weight="600">crossing</text>
    <text x="14" y="34" font-size="7.5" fill="#7c3aed" font-weight="600">over</text>
    <text x="0" y="70" text-anchor="middle" font-size="8.5" fill="#be123c" font-weight="bold">Prophase I</text>
  </g>

  <!-- Metaphase I: pairs at plate -->
  <g transform="translate(278,76)">
    <circle cx="0" cy="30" r="29" fill="url(#prophaseGrad)" stroke="#e11d48" stroke-width="1.5" filter="url(#dsSmall)"/>
    <line x1="0" y1="8" x2="0" y2="52" stroke="#94a3b8" stroke-width="0.7" stroke-dasharray="2,2"/>
    <line x1="-9" y1="17" x2="-9" y2="43" stroke="url(#maternalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="9" y1="17" x2="9" y2="43" stroke="url(#paternalGrad)" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="70" text-anchor="middle" font-size="8.5" fill="#be123c" font-weight="bold">Meta I</text>
  </g>

  <!-- Anaphase I / Telophase I: homologs separate -->
  <g transform="translate(348,76)">
    <ellipse cx="0" cy="30" rx="36" ry="29" fill="url(#prophaseGrad)" stroke="#e11d48" stroke-width="1.5" filter="url(#dsSmall)"/>
    <line x1="-18" y1="17" x2="-18" y2="43" stroke="url(#maternalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="17" x2="18" y2="43" stroke="url(#paternalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="0" y2="52" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="0" y="70" text-anchor="middle" font-size="8.5" fill="#be123c" font-weight="bold">Ana/Telo I</text>
  </g>

  <!-- Two cells after Meiosis I -->
  <path d="M408 105 L438 82" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M408 105 L438 128" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Cell 1 (maternal-enriched) -->
  <circle cx="472" cy="73" r="26" fill="url(#meiosisICellGrad)" stroke="#dc2626" stroke-width="2" filter="url(#ds)"/>
  <line x1="464" y1="62" x2="464" y2="84" stroke="url(#maternalGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="480" y1="65" x2="480" y2="81" stroke="url(#maternalGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Cell 2 (paternal-enriched) -->
  <circle cx="472" cy="137" r="26" fill="url(#meiosisIICellGrad)" stroke="#2563eb" stroke-width="2" filter="url(#ds)"/>
  <line x1="464" y1="126" x2="464" y2="148" stroke="url(#paternalGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="480" y1="129" x2="480" y2="145" stroke="url(#paternalGrad)" stroke-width="4" stroke-linecap="round"/>

  <text x="472" y="175" text-anchor="middle" font-size="9" fill="#475569">n = 2 each</text>
  <text x="472" y="186" text-anchor="middle" font-size="9" fill="#475569">(haploid, still</text>
  <text x="472" y="196" text-anchor="middle" font-size="9" fill="#475569">sister chromatids)</text>

  <!-- ===== MEIOSIS II ===== -->
  <rect x="518" y="40" width="185" height="160" rx="12" fill="url(#meiosisIIBoxGrad)" stroke="#2563eb" stroke-width="2" filter="url(#dsBox)"/>
  <text x="610" y="58" text-anchor="middle" font-size="13.5" fill="#1d4ed8" font-weight="bold">MEIOSIS II (Equational)</text>
  <text x="610" y="72" text-anchor="middle" font-size="9" fill="#64748b">(like mitosis)</text>

  <!-- Arrows in to Meiosis II -->
  <path d="M500 73 L533 80" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M500 137 L533 133" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Meiosis II cells splitting (top) -->
  <g transform="translate(580,88)">
    <ellipse cx="0" cy="0" rx="32" ry="19" fill="url(#meiosisICellGrad)" stroke="#dc2626" stroke-width="1.5" filter="url(#dsSmall)"/>
    <line x1="-13" y1="-6" x2="-13" y2="6" stroke="url(#maternalGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="13" y1="-6" x2="13" y2="6" stroke="url(#maternalGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="2,2"/>
  </g>
  <!-- Meiosis II cells splitting (bottom) -->
  <g transform="translate(580,140)">
    <ellipse cx="0" cy="0" rx="32" ry="19" fill="url(#meiosisIICellGrad)" stroke="#2563eb" stroke-width="1.5" filter="url(#dsSmall)"/>
    <line x1="-13" y1="-6" x2="-13" y2="6" stroke="url(#paternalGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="13" y1="-6" x2="13" y2="6" stroke="url(#paternalGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#2563eb" stroke-width="0.8" stroke-dasharray="2,2"/>
  </g>

  <!-- Result heading -->
  <text x="360" y="232" text-anchor="middle" font-size="14.5" fill="#166534" font-weight="bold">Result: 4 Unique Haploid Cells (n)</text>

  <!-- Arrows from Meiosis II to final cells -->
  <path d="M560 108 L200 250" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <path d="M590 108 L330 250" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <path d="M590 158 L430 250" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <path d="M610 158 L560 250" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Final 4 cells -->
  <g transform="translate(155,285)">
    <circle cx="0" cy="0" r="32" fill="url(#finalCellGrad)" stroke="#16a34a" stroke-width="2.5" filter="url(#ds)"/>
    <line x1="-9" y1="-10" x2="-9" y2="10" stroke="url(#maternalGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="9" y1="-7" x2="9" y2="7" stroke="url(#maternalGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <text x="0" y="47" text-anchor="middle" font-size="9.5" fill="#166534" font-weight="600">n = 2</text>
  </g>
  <g transform="translate(295,285)">
    <circle cx="0" cy="0" r="32" fill="url(#finalCellGrad)" stroke="#16a34a" stroke-width="2.5" filter="url(#ds)"/>
    <line x1="-9" y1="-10" x2="-9" y2="10" stroke="url(#maternalGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="9" y1="-7" x2="9" y2="7" stroke="url(#paternalGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <text x="0" y="47" text-anchor="middle" font-size="9.5" fill="#166534" font-weight="600">n = 2</text>
    <text x="0" y="58" text-anchor="middle" font-size="7.5" fill="#7c3aed" font-weight="600">(recombinant)</text>
  </g>
  <g transform="translate(435,285)">
    <circle cx="0" cy="0" r="32" fill="url(#finalCellGrad)" stroke="#16a34a" stroke-width="2.5" filter="url(#ds)"/>
    <line x1="-9" y1="-10" x2="-9" y2="10" stroke="url(#paternalGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="9" y1="-7" x2="9" y2="7" stroke="url(#maternalGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <text x="0" y="47" text-anchor="middle" font-size="9.5" fill="#166534" font-weight="600">n = 2</text>
    <text x="0" y="58" text-anchor="middle" font-size="7.5" fill="#7c3aed" font-weight="600">(recombinant)</text>
  </g>
  <g transform="translate(575,285)">
    <circle cx="0" cy="0" r="32" fill="url(#finalCellGrad)" stroke="#16a34a" stroke-width="2.5" filter="url(#ds)"/>
    <line x1="-9" y1="-10" x2="-9" y2="10" stroke="url(#paternalGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="9" y1="-7" x2="9" y2="7" stroke="url(#paternalGrad)" stroke-width="4.5" stroke-linecap="round"/>
    <text x="0" y="47" text-anchor="middle" font-size="9.5" fill="#166534" font-weight="600">n = 2</text>
  </g>

  <!-- Key facts box -->
  <rect x="30" y="362" width="660" height="108" rx="10" fill="url(#factsBoxGrad)" stroke="#cbd5e1" stroke-width="1.5" filter="url(#dsBox)"/>
  <text x="360" y="383" text-anchor="middle" font-size="13.5" fill="#1e293b" font-weight="bold">Key Exam Facts — Meiosis vs Mitosis</text>
  <line x1="220" y1="388" x2="500" y2="388" stroke="#cbd5e1" stroke-width="0.8"/>
  <text x="50" y="406" font-size="10.5" fill="#334155">&#x2022; <tspan font-weight="bold">Meiosis:</tspan> 2 divisions &#x2192; 4 haploid (n) genetically UNIQUE cells | Occurs in gonads (gamete production)</text>
  <text x="50" y="423" font-size="10.5" fill="#334155">&#x2022; <tspan font-weight="bold">Mitosis:</tspan> 1 division &#x2192; 2 diploid (2n) genetically IDENTICAL cells | Occurs in somatic cells (growth/repair)</text>
  <text x="50" y="440" font-size="10.5" fill="#334155">&#x2022; <tspan font-weight="bold" fill="#7c3aed">Genetic variation sources:</tspan> Crossing over (Prophase I) + Independent assortment (Metaphase I) + Random fertilization</text>
  <text x="50" y="457" font-size="10.5" fill="#dc2626" font-weight="bold">&#x26A0; Meiosis I = homologous pairs separate (reductional) | Meiosis II = sister chromatids separate (like mitosis)</text>
</svg>