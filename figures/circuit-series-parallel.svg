<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="'Segoe UI', Arial, sans-serif" font-size="11">
  <title>Series vs Parallel Circuits</title>

  <!-- ===== DEFS: Gradients, Filters, Markers ===== -->
  <defs>
    <!-- Wire metallic gradient -->
    <linearGradient id="wireGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b8c4"/>
      <stop offset="50%" stop-color="#6b7a8d"/>
      <stop offset="100%" stop-color="#b0b8c4"/>
    </linearGradient>

    <!-- Series resistor gradient (blue) -->
    <linearGradient id="resistorBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#1e5fa8"/>
    </linearGradient>

    <!-- Parallel resistor gradient (red) -->
    <linearGradient id="resistorRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e05555"/>
      <stop offset="100%" stop-color="#b22a2a"/>
    </linearGradient>

    <!-- Battery gradient -->
    <linearGradient id="batteryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="50%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>

    <!-- Junction node radial gradient -->
    <radialGradient id="junctionGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </radialGradient>

    <!-- Box background gradients -->
    <linearGradient id="seriesBoxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f6ff"/>
      <stop offset="100%" stop-color="#dce8f7"/>
    </linearGradient>
    <linearGradient id="parallelBoxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5f5"/>
      <stop offset="100%" stop-color="#f7dcdc"/>
    </linearGradient>

    <!-- Table header gradient -->
    <linearGradient id="tableHeaderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474f"/>
      <stop offset="100%" stop-color="#263238"/>
    </linearGradient>

    <!-- Badge gradients -->
    <linearGradient id="badgeBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
    <linearGradient id="badgeRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#ef5350"/>
    </linearGradient>

    <!-- Current arrow gradient -->
    <linearGradient id="currentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff1744"/>
      <stop offset="100%" stop-color="#ff8a80"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="1.5" dy="2" stdDeviation="2.5" flood-color="#00000030"/>
    </filter>
    <filter id="shadowSmall" x="-8%" y="-8%" width="116%" height="128%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.2" flood-color="#00000025"/>
    </filter>

    <!-- Current flow arrowhead -->
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ff1744"/>
    </marker>
    <marker id="arrowRedBack" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#ff1744"/>
    </marker>

    <!-- Zigzag resistor symbol (series/blue) -->
    <symbol id="zigzagBlue" viewBox="0 0 48 20">
      <polyline points="0,10 6,10 10,2 16,18 22,2 28,18 34,2 38,18 42,10 48,10"
        fill="none" stroke="url(#resistorBlue)" stroke-width="2.2" stroke-linejoin="round"/>
    </symbol>

    <!-- Zigzag resistor symbol (parallel/red) -->
    <symbol id="zigzagRed" viewBox="0 0 48 20">
      <polyline points="0,10 6,10 10,2 16,18 22,2 28,18 34,2 38,18 42,10 48,10"
        fill="none" stroke="url(#resistorRed)" stroke-width="2.2" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="720" height="480" fill="#f5f7fa" rx="6"/>

  <!-- Title -->
  <text x="360" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#1a202c">Series vs Parallel Circuits</text>

  <!-- ========================================================= -->
  <!-- ===== SERIES CIRCUIT BOX ===== -->
  <!-- ========================================================= -->
  <rect x="12" y="34" width="342" height="195" rx="10" fill="url(#seriesBoxBg)" stroke="#b0c4de" stroke-width="0.8" filter="url(#shadow)"/>

  <!-- Badge: Series Circuit -->
  <rect x="22" y="40" width="120" height="20" rx="10" fill="url(#badgeBlue)"/>
  <text x="82" y="54" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Series Circuit</text>

  <!-- Series circuit wiring -->
  <!-- Top wire: battery+ to R1 to R2 to R3 -->
  <line x1="52" y1="100" x2="52" y2="80" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="80" x2="100" y2="80" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- R1 -->
  <use href="#zigzagBlue" x="100" y="70" width="48" height="20"/>
  <text x="124" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">R&#x2081;</text>

  <line x1="148" y1="80" x2="180" y2="80" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- R2 -->
  <use href="#zigzagBlue" x="180" y="70" width="48" height="20"/>
  <text x="204" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">R&#x2082;</text>

  <line x1="228" y1="80" x2="258" y2="80" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- R3 -->
  <use href="#zigzagBlue" x="258" y="70" width="48" height="20"/>
  <text x="282" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">R&#x2083;</text>

  <line x1="306" y1="80" x2="328" y2="80" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="328" y1="80" x2="328" y2="140" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Bottom wire back to battery- -->
  <line x1="328" y1="140" x2="52" y2="140" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="140" x2="52" y2="120" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Battery symbol (vertical, left side) -->
  <rect x="44" y="98" width="16" height="24" rx="2" fill="url(#batteryGrad)" stroke="#2e7d32" stroke-width="0.8" filter="url(#shadowSmall)"/>
  <!-- Long plate (+) -->
  <line x1="42" y1="103" x2="62" y2="103" stroke="#1b5e20" stroke-width="2"/>
  <!-- Short plate (-) -->
  <line x1="46" y1="117" x2="58" y2="117" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="38" y="103" text-anchor="end" font-size="11" font-weight="700" fill="#2e7d32">+</text>
  <text x="38" y="120" text-anchor="end" font-size="11" font-weight="700" fill="#c62828">&#x2013;</text>
  <text x="52" y="135" text-anchor="middle" font-size="8" fill="#555">V</text>

  <!-- Current flow arrow (clockwise around the loop) -->
  <line x1="160" y1="75" x2="172" y2="75" stroke="#ff1744" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="166" y="72" text-anchor="middle" font-size="7.5" fill="#ff1744" font-weight="600">I</text>

  <line x1="220" y1="145" x2="200" y2="145" stroke="#ff1744" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="210" y="155" text-anchor="middle" font-size="7.5" fill="#ff1744" font-weight="600">I (same everywhere)</text>

  <!-- Series formulas -->
  <text x="24" y="175" font-size="9.5" fill="#1a237e" font-weight="600">R&#x209C;&#x2092;&#x209C; = R&#x2081; + R&#x2082; + R&#x2083;</text>
  <text x="24" y="188" font-size="9.5" fill="#1a237e" font-weight="600">V&#x209C;&#x2092;&#x209C; = V&#x2081; + V&#x2082; + V&#x2083;</text>
  <text x="24" y="201" font-size="9.5" fill="#1a237e" font-weight="600">I is the same through all components</text>
  <text x="24" y="214" font-size="8.5" fill="#555" font-style="italic">If one component fails &#x2192; entire circuit breaks</text>

  <!-- ========================================================= -->
  <!-- ===== PARALLEL CIRCUIT BOX ===== -->
  <!-- ========================================================= -->
  <rect x="366" y="34" width="342" height="195" rx="10" fill="url(#parallelBoxBg)" stroke="#e0b0b0" stroke-width="0.8" filter="url(#shadow)"/>

  <!-- Badge: Parallel Circuit -->
  <rect x="376" y="40" width="128" height="20" rx="10" fill="url(#badgeRed)"/>
  <text x="440" y="54" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Parallel Circuit</text>

  <!-- Battery (left side, vertical) -->
  <rect x="396" y="98" width="16" height="24" rx="2" fill="url(#batteryGrad)" stroke="#2e7d32" stroke-width="0.8" filter="url(#shadowSmall)"/>
  <line x1="394" y1="103" x2="414" y2="103" stroke="#1b5e20" stroke-width="2"/>
  <line x1="398" y1="117" x2="410" y2="117" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="390" y="103" text-anchor="end" font-size="11" font-weight="700" fill="#2e7d32">+</text>
  <text x="390" y="120" text-anchor="end" font-size="11" font-weight="700" fill="#c62828">&#x2013;</text>
  <text x="404" y="135" text-anchor="middle" font-size="8" fill="#555">V</text>

  <!-- Top bus wire -->
  <line x1="404" y1="100" x2="404" y2="75" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="404" y1="75" x2="680" y2="75" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Bottom bus wire -->
  <line x1="404" y1="120" x2="404" y2="145" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>
  <line x1="404" y1="145" x2="680" y2="145" stroke="url(#wireGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Junction nodes at top -->
  <circle cx="480" cy="75" r="4.5" fill="url(#junctionGrad)" stroke="#f9a825" stroke-width="0.8"/>
  <circle cx="560" cy="75" r="4.5" fill="url(#junctionGrad)" stroke="#f9a825" stroke-width="0.8"/>
  <circle cx="640" cy="75" r="4.5" fill="url(#junctionGrad)" stroke="#f9a825" stroke-width="0.8"/>

  <!-- Junction nodes at bottom -->
  <circle cx="480" cy="145" r="4.5" fill="url(#junctionGrad)" stroke="#f9a825" stroke-width="0.8"/>
  <circle cx="560" cy="145" r="4.5" fill="url(#junctionGrad)" stroke="#f9a825" stroke-width="0.8"/>
  <circle cx="640" cy="145" r="4.5" fill="url(#junctionGrad)" stroke="#f9a825" stroke-width="0.8"/>

  <!-- Branch 1: R1 -->
  <line x1="480" y1="75" x2="480" y2="96" stroke="url(#wireGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <use href="#zigzagRed" x="456" y="96" width="48" height="28"/>
  <line x1="480" y1="124" x2="480" y2="145" stroke="url(#wireGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <text x="480" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">R&#x2081;</text>

  <!-- Branch 2: R2 -->
  <line x1="560" y1="75" x2="560" y2="96" stroke="url(#wireGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <use href="#zigzagRed" x="536" y="96" width="48" height="28"/>
  <line x1="560" y1="124" x2="560" y2="145" stroke="url(#wireGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <text x="560" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">R&#x2082;</text>

  <!-- Branch 3: R3 -->
  <line x1="640" y1="75" x2="640" y2="96" stroke="url(#wireGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <use href="#zigzagRed" x="616" y="96" width="48" height="28"/>
  <line x1="640" y1="124" x2="640" y2="145" stroke="url(#wireGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <text x="640" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">R&#x2083;</text>

  <!-- Current arrows: main and split -->
  <line x1="420" y1="70" x2="438" y2="70" stroke="#ff1744" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="430" y="66" text-anchor="middle" font-size="7.5" fill="#ff1744" font-weight="600">I&#x209C;&#x2092;&#x209C;</text>

  <!-- Split current labels -->
  <text x="480" y="140" text-anchor="middle" font-size="7" fill="#ff1744" font-weight="600">I&#x2081;</text>
  <text x="560" y="140" text-anchor="middle" font-size="7" fill="#ff1744" font-weight="600">I&#x2082;</text>
  <text x="640" y="140" text-anchor="middle" font-size="7" fill="#ff1744" font-weight="600">I&#x2083;</text>

  <!-- Parallel formulas -->
  <text x="376" y="175" font-size="9.5" fill="#b71c1c" font-weight="600">1/R&#x209C;&#x2092;&#x209C; = 1/R&#x2081; + 1/R&#x2082; + 1/R&#x2083;</text>
  <text x="376" y="188" font-size="9.5" fill="#b71c1c" font-weight="600">V is the same across all branches</text>
  <text x="376" y="201" font-size="9.5" fill="#b71c1c" font-weight="600">I&#x209C;&#x2092;&#x209C; = I&#x2081; + I&#x2082; + I&#x2083;</text>
  <text x="376" y="214" font-size="8.5" fill="#555" font-style="italic">If one branch fails &#x2192; others still work</text>

  <!-- ========================================================= -->
  <!-- ===== COMPARISON TABLE ===== -->
  <!-- ========================================================= -->
  <g transform="translate(36, 244)">
    <!-- Table shadow background -->
    <rect x="-2" y="-2" width="652" height="148" rx="8" fill="#00000018" filter="url(#shadow)"/>
    <!-- Table container -->
    <rect x="0" y="0" width="648" height="144" rx="7" fill="#ffffff" stroke="#cfd8dc" stroke-width="0.8"/>

    <!-- Header row -->
    <rect x="0" y="0" width="648" height="26" rx="7" fill="url(#tableHeaderGrad)"/>
    <!-- Fix bottom corners of header (cover the rounded part so it looks flat at bottom) -->
    <rect x="0" y="14" width="648" height="12" fill="url(#tableHeaderGrad)"/>

    <!-- Header text -->
    <text x="82" y="17" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Property</text>
    <text x="276" y="17" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Series</text>
    <text x="504" y="17" text-anchor="middle" font-size="10.5" font-weight="700" fill="#ffffff">Parallel</text>

    <!-- Column dividers -->
    <line x1="162" y1="0" x2="162" y2="144" stroke="#cfd8dc" stroke-width="0.6"/>
    <line x1="390" y1="0" x2="390" y2="144" stroke="#cfd8dc" stroke-width="0.6"/>

    <!-- Row backgrounds (alternating) -->
    <rect x="0" y="26" width="648" height="24" fill="#f8fafc"/>
    <rect x="0" y="50" width="648" height="24" fill="#ffffff"/>
    <rect x="0" y="74" width="648" height="24" fill="#f8fafc"/>
    <rect x="0" y="98" width="648" height="24" fill="#ffffff"/>
    <rect x="0" y="122" width="648" height="22" rx="0" fill="#f8fafc"/>
    <!-- Bottom rounded corners for last row -->
    <rect x="0" y="130" width="648" height="14" rx="7" fill="#f8fafc"/>
    <rect x="0" y="122" width="648" height="10" fill="#f8fafc"/>

    <!-- Row dividers -->
    <line x1="0" y1="26" x2="648" y2="26" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="648" y2="50" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="74" x2="648" y2="74" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="98" x2="648" y2="98" stroke="#e0e0e0" stroke-width="0.5"/>
    <line x1="0" y1="122" x2="648" y2="122" stroke="#e0e0e0" stroke-width="0.5"/>

    <!-- Row 1: Current -->
    <text x="12" y="42" font-size="10" font-weight="600" fill="#37474f">Current (I)</text>
    <text x="276" y="42" text-anchor="middle" font-size="9.5" fill="#1a237e">Same through all components</text>
    <text x="504" y="42" text-anchor="middle" font-size="9.5" fill="#b71c1c">Splits among branches: I&#x209C;&#x2092;&#x209C; = I&#x2081;+I&#x2082;+I&#x2083;</text>

    <!-- Row 2: Voltage -->
    <text x="12" y="66" font-size="10" font-weight="600" fill="#37474f">Voltage (V)</text>
    <text x="276" y="66" text-anchor="middle" font-size="9.5" fill="#1a237e">Divides: V&#x209C;&#x2092;&#x209C; = V&#x2081;+V&#x2082;+V&#x2083;</text>
    <text x="504" y="66" text-anchor="middle" font-size="9.5" fill="#b71c1c">Same across all branches</text>

    <!-- Row 3: Total Resistance -->
    <text x="12" y="90" font-size="10" font-weight="600" fill="#37474f">R&#x209C;&#x2092;&#x209C;&#x2090;&#x2097;</text>
    <text x="276" y="90" text-anchor="middle" font-size="9.5" fill="#1a237e">R&#x209C;&#x2092;&#x209C; = R&#x2081;+R&#x2082;+R&#x2083; (increases)</text>
    <text x="504" y="90" text-anchor="middle" font-size="9.5" fill="#b71c1c">1/R&#x209C;&#x2092;&#x209C; = 1/R&#x2081;+1/R&#x2082;+1/R&#x2083; (decreases)</text>

    <!-- Row 4: Failure -->
    <text x="12" y="114" font-size="10" font-weight="600" fill="#37474f">Failure Mode</text>
    <text x="276" y="114" text-anchor="middle" font-size="9.5" fill="#1a237e">One fails &#x2192; all stop</text>
    <text x="504" y="114" text-anchor="middle" font-size="9.5" fill="#b71c1c">One fails &#x2192; others continue</text>

    <!-- Row 5: Example -->
    <text x="12" y="138" font-size="10" font-weight="600" fill="#37474f">Example</text>
    <text x="276" y="138" text-anchor="middle" font-size="9.5" fill="#1a237e">Old holiday string lights</text>
    <text x="504" y="138" text-anchor="middle" font-size="9.5" fill="#b71c1c">Household electrical outlets</text>
  </g>

  <!-- ===== Key Insight Note ===== -->
  <rect x="36" y="400" width="648" height="34" rx="6" fill="#e8f5e9" stroke="#81c784" stroke-width="0.6" filter="url(#shadowSmall)"/>
  <text x="360" y="414" text-anchor="middle" font-size="9.5" fill="#2e7d32" font-weight="600">Key Insight: Most real circuits use a combination of series and parallel elements.</text>
  <text x="360" y="428" text-anchor="middle" font-size="9" fill="#388e3c">Series for current control &amp; sensing | Parallel for redundancy &amp; power distribution</text>

  <!-- Footer -->
  <text x="360" y="468" text-anchor="middle" font-size="8" fill="#90a4ae">Series vs Parallel Circuits &#x2014; Shos Med Global</text>
</svg>
