<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="globeGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8784A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CF5B2E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGradW" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef0e8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Decorative circle ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Globe/Circle Mark -->
  <circle cx="50" cy="50" r="38" fill="url(#globeGradW)" />

  <!-- Globe latitude lines -->
  <ellipse cx="50" cy="50" rx="38" ry="14" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
  <ellipse cx="50" cy="50" rx="38" ry="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>

  <!-- Globe longitude lines -->
  <ellipse cx="50" cy="50" rx="14" ry="38" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
  <ellipse cx="50" cy="50" rx="28" ry="38" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>

  <!-- Medical cross -->
  <rect x="42" y="32" width="16" height="36" rx="2.5" fill="url(#crossGradW)" opacity="0.95"/>
  <rect x="32" y="42" width="36" height="16" rx="2.5" fill="url(#crossGradW)" opacity="0.95"/>

  <!-- Text: SHOS -->
  <text x="105" y="45" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" letter-spacing="1">SHOS</text>

  <!-- Text: Med -->
  <text x="228" y="45" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="36" fill="#E8784A" letter-spacing="0.5">Med</text>

  <!-- Text: Global -->
  <text x="105" y="75" font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="400" font-size="22" fill="rgba(255,255,255,0.65)" letter-spacing="4">GLOBAL</text>

  <!-- Decorative dot -->
  <circle cx="300" cy="70" r="3" fill="#E8784A" opacity="0.5"/>
</svg>