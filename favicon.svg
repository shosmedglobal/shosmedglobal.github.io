<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2137"/>
      <stop offset="100%" style="stop-color:#2D3555"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CF5B2E"/>
      <stop offset="100%" style="stop-color:#E8784A"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M50 4 L92 20 L92 52 C92 74 74 90 50 98 C26 90 8 74 8 52 L8 20 Z" fill="url(#shieldGrad)"/>
  <!-- Shield inner border -->
  <path d="M50 9 L88 23 L88 52 C88 72 72 86 50 93 C28 86 12 72 12 52 L12 23 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Medical cross — bold for small sizes -->
  <rect x="41" y="26" width="18" height="44" rx="3" fill="url(#crossGrad)"/>
  <rect x="28" y="39" width="44" height="18" rx="3" fill="url(#crossGrad)"/>
</svg>
