<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SHOS Med</title>
  <meta name="description" content="Create a free SHOS Med account. Access entrance exam prep, USMLE resources, mentorship, and join our medical student community.">
  <meta property="og:title" content="Sign Up - SHOS Med">
  <meta property="og:description" content="Create a free account. Access entrance exam prep, USMLE resources, and mentorship for medical students.">
  <meta property="og:url" content="https://shosmed.com/signup.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="SHOS Med">
  <meta property="og:image" content="https://shosmed.com/assets/shos-logo-full-dark.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=5"><link rel="icon" type="image/png" sizes="48x48" href="favicon.png?v=5"><link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="canonical" href="https://shosmed.com/signup.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script>
  /* Auth pre-render for signup page - if user is cached as authed, redirect
     immediately (honoring ?redirect=qbank) so they don't see the signup
     form flash. Firebase verifies on the destination side. */
  (function() {
    try {
      var cached = localStorage.getItem('shos_authed');
      if (cached === '1') {
        var params = new URLSearchParams(window.location.search);
        var dest = params.get('redirect') === 'qbank'
          ? ('qbank.html?v=20260423a&t=' + Date.now())
          : 'dashboard.html';
        window.location.replace(dest);
        return;
      }
      document.documentElement.setAttribute('data-auth', 'anon');
    } catch (e) {
      document.documentElement.setAttribute('data-auth', 'anon');
    }
  })();
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .terms-agree {
      margin-top: 4px;
      margin-bottom: 0;
    }
    .terms-checkbox-label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--gray-600);
      position: relative;
      padding-left: 0;
    }
    .terms-checkbox-label input[type="checkbox"] {
      width: 20px;
      height: 20px;
      min-width: 20px;
      margin-top: 1px;
      accent-color: var(--accent, #CF5B2E);
      cursor: pointer;
    }
    .terms-text a {
      color: var(--accent, #CF5B2E);
      font-weight: 600;
      text-decoration: underline;
    }
    .terms-text a:hover {
      color: var(--accent-dark, #A84823);
    }
    .terms-error {
      color: var(--red, #DC2626);
      font-size: 0.85rem;
      margin-top: 6px;
      display: none;
    }
    .terms-checkbox-label input[type="checkbox"]:invalid {
      outline: 2px solid var(--red, #DC2626);
      outline-offset: 1px;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar scrolled">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="assets/shos-logo-full-dark.png" alt="SHOS Med" class="logo-img logo-full logo-dark">
      </a>
      <ul class="nav-links" id="navLinks">
        <li id="auth-links">
          <a href="login.html" class="nav-login">Log In</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Sign Up Form -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Create Your Account</h2>
          <p>Join SHOS Med and start your journey</p>
        </div>

        <!-- Google Sign Up -->
        <button class="btn-google" id="googleSignUp">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign up with Google
        </button>

        <div class="auth-divider">
          <span>or sign up with email</span>
        </div>

        <!-- Email Sign Up Form -->
        <form id="signupForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" required placeholder="Your full name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="At least 6 characters" minlength="6">
          </div>
          <div class="form-group">
            <label>I am:</label>
            <div class="path-selector">
              <label class="path-option">
                <input type="radio" name="path" value="applicant" checked>
                <div class="path-option-content">
                  <svg class="path-option-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                  <div>
                    <strong>Med School Application</strong>
                    <span>I want to study medicine in the Czech Republic</span>
                  </div>
                </div>
              </label>
              <label class="path-option">
                <input type="radio" name="path" value="student">
                <div class="path-option-content">
                  <svg class="path-option-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 2v8a4 4 0 1 1-8 0V2"/><circle cx="19" cy="15" r="3"/><path d="M7 14a5 5 0 0 0 5 5 7 7 0 0 0 7-4"/></svg>
                  <div>
                    <strong>Residency Application</strong>
                    <span>I need USMLE prep and match mentorship</span>
                  </div>
                </div>
              </label>
            </div>
          </div>

          <!-- Terms of Service Agreement -->
          <div class="form-group terms-agree">
            <label class="terms-checkbox-label">
              <input type="checkbox" id="agreeTerms" required>
              <span class="terms-text">I have read and agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></span>
            </label>
          </div>

          <div id="errorMsg" class="error-msg" style="display:none;"></div>

          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
      </div>
    </div>
  </section>

  <!-- Cookie Consent Banner -->
  <div class="cookie-banner" id="cookieBanner" style="display:none;">
    <p>We use essential cookies for authentication and site functionality. By continuing to use this site, you consent to our use of cookies. <a href="privacy.html">Learn More</a></p>
    <button class="cookie-accept" id="cookieAccept">Accept</button>
  </div>
  <script>
    (function(){
      if(!localStorage.getItem('cookie_consent')){document.getElementById('cookieBanner').style.display='flex';}
      document.getElementById('cookieAccept').addEventListener('click',function(){localStorage.setItem('cookie_consent','accepted');document.getElementById('cookieBanner').style.display='none';});
    })();
  </script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="auth.js"></script>
  <script>
    // Get redirect destination (default: dashboard)
    const urlParams = new URLSearchParams(window.location.search);
    const redirectTo = urlParams.get('redirect') === 'qbank' ? ('qbank.html?v=20260423a&t=' + Date.now()) : 'dashboard.html';

    // Redirect if already logged in
    auth.onAuthStateChanged((user) => {
      if (user) window.location.href = redirectTo;
    });

    // Email/Password Sign Up
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const path = document.querySelector('input[name="path"]:checked').value;
      const termsCheckbox = document.getElementById('agreeTerms');
      const errorMsg = document.getElementById('errorMsg');
      const btn = e.target.querySelector('button[type="submit"]');

      errorMsg.style.display = 'none';

      if (!termsCheckbox.checked) {
        errorMsg.textContent = 'You must agree to the Terms of Service before creating an account.';
        errorMsg.style.display = 'block';
        termsCheckbox.focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const result = await signUpWithEmail(name, email, password, path);
      if (result.success) {
        window.location.href = redirectTo;
      } else {
        errorMsg.textContent = result.error;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    // Google Sign Up
    document.getElementById('googleSignUp').addEventListener('click', async () => {
      const termsCheckbox = document.getElementById('agreeTerms');
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!termsCheckbox.checked) {
        errorMsg.textContent = 'You must agree to the Terms of Service before creating an account.';
        errorMsg.style.display = 'block';
        termsCheckbox.focus();
        return;
      }

      const path = document.querySelector('input[name="path"]:checked').value;

      const result = await signInWithGoogle(path, true);
      if (result.success) {
        window.location.href = redirectTo;
      } else {
        errorMsg.textContent = result.error;
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
